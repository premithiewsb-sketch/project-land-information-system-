services:
  - type: web
    name: india-lims-flask
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    plan: free
    envVars:
      - key: MONGO_URI
        value: "<your-mongo-uri-here>"
      # Add other environment variables as needed
    autoDeploy: true
